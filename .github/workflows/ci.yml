name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: novel_gen
          POSTGRES_USER: novel
          POSTGRES_PASSWORD: novel123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U novel -d novel_gen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: novel_gen
      DB_USER: novel
      DB_PASSWORD: novel123
      LLM_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pipx install poetry
      - run: poetry install --no-interaction
      - run: poetry run alembic upgrade head
      - run: poetry run alembic current
      - run: poetry run ruff check app tests
      - run: poetry run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
